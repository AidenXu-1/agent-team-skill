name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile scripts
        run: |
          python -m py_compile scripts/scaffold_team.py scripts/verify_agent_team.py

      - name: Run verifier
        run: |
          python scripts/verify_agent_team.py
